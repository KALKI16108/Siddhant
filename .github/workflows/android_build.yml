name: Compile Mobile Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js System Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize Android Java SDK Runtime
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create Web Root Folder
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          else
            echo "<h1>AIFlowix Engine Ready</h1>" > www/index.html
          fi

      - name: Install Capacitor Core Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android

      - name: Initialize Android Native Project Structural Layers
        run: |
          npx cap init "AIFlowix Logistics Terminal" "in.aflowix.logistics" --web-dir=www --confirm || true
          npx cap add android || true
          npx cap sync android

      - name: Compile Production Android Native Binary (APK)
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload Finished APK Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIFlowix-Mobile-Terminal-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
